<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<meta name="google-site-verification" content="B3cXyT1DCgKE1uaLImi9JXCxDxppzFQmuEYuvJDPLWU">

<title>Dünya Saatleri</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter;
    background: #fff;
    color: #111;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
}

/* Büyük ekran */
#bigCity {
    font-size: 40px;
    margin-bottom: 10px;
    color: #666;
}

#bigTime {
    font-size: 100px;
    font-weight: 600;
}

/* alt şehirler */
.cities {
    margin-top: 40px;
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

.city {
    padding: 10px 15px;
    border: 1px solid #ddd;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.city:hover {
    background: #f2f2f2;
}
</style>

</head>

<body>

<div class="container">

    <div id="bigCity">İstanbul</div>
    <div id="bigTime">--:--:--</div>

    <div class="cities">
        <div class="city" onclick="setCity('Europe/Istanbul','İstanbul')">İstanbul</div>
        <div class="city" onclick="setCity('Europe/London','Londra')">Londra</div>
        <div class="city" onclick="setCity('America/New_York','New York')">New York</div>
        <div class="city" onclick="setCity('Asia/Tokyo','Tokyo')">Tokyo</div>
    </div>

</div>

<script>

let currentZone = "Europe/Istanbul";
let currentName = "İstanbul";

function setCity(zone, name){
    currentZone = zone;
    currentName = name;
    document.getElementById("bigCity").innerText = name;
}

function update(){
    let time = new Date().toLocaleTimeString("tr-TR", {
        timeZone: currentZone,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
    });

    document.getElementById("bigTime").innerText = time;
}

setInterval(update, 1000);
update();

</script>

</body>
</html>
