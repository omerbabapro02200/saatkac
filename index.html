<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<!-- Google doğrulama (KESİN SİLME) -->
<meta name="google-site-verification" content="B3cXyT1DCgKE1uaLImi9JXCxDxppzFQmuEYuvJDPLWU">

<title>Saat Kaç?</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    color: #111;
}

.box {
    text-align: center;
}

#clock {
    font-size: 90px;
    font-weight: 600;
    letter-spacing: 2px;
}

#date {
    margin-top: 15px;
    font-size: 22px;
    color: #555;
}

.cities {
    margin-top: 30px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    font-size: 18px;
    color: #333;
}

.city {
    padding: 10px;
}
</style>

</head>

<body>

<div class="box">

    <!-- Ana saat -->
    <div id="clock">00:00:00</div>
    <div id="date"></div>

    <!-- Dünya saatleri -->
    <div class="cities">
        <div class="city">İstanbul: <span id="istanbul"></span></div>
        <div class="city">Londra: <span id="london"></span></div>
        <div class="city">New York: <span id="ny"></span></div>
        <div class="city">Tokyo: <span id="tokyo"></span></div>
    </div>

</div>

<script>
function update() {

    let now = new Date();

    let h = now.getHours().toString().padStart(2,'0');
    let m = now.getMinutes().toString().padStart(2,'0');
    let s = now.getSeconds().toString().padStart(2,'0');

    document.getElementById("clock").innerText = `${h}:${m}:${s}`;

    let days = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
    let months = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

    document.getElementById("date").innerText =
        `${days[now.getDay()]} • ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;

    document.getElementById("istanbul").innerText =
        new Date().toLocaleTimeString("tr-TR", { timeZone: "Europe/Istanbul" });

    document.getElementById("london").innerText =
        new Date().toLocaleTimeString("tr-TR", { timeZone: "Europe/London" });

    document.getElementById("ny").innerText =
        new Date().toLocaleTimeString("tr-TR", { timeZone: "America/New_York" });

    document.getElementById("tokyo").innerText =
        new Date().toLocaleTimeString("tr-TR", { timeZone: "Asia/Tokyo" });
}

setInterval(update, 1000);
update();
</script>

</body>
</html>
