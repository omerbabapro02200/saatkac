<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<meta name="google-site-verification" content="B3cXyT1DCgKE1uaLImi9JXCxDxppzFQmuEYuvJDPLWU">

<title>Dünya Saatleri</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter;
    background: #fff;
    color: #111;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
}

#swControls {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    gap: 10px;
}

#swControls button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.start { background: #28a745; color: white; }
.stop { background: #ffc107; }
.reset { background: #dc3545; color: white; }

#bigCity {
    font-size: 40px;
    margin-bottom: 10px;
    color: #666;
}

#bigTime {
    font-size: 100px;
    font-weight: 600;
    font-family: monospace;
    letter-spacing: 2px;
}

.cities {
    margin-top: 40px;
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

.city {
    padding: 10px 15px;
    border: 1px solid #ddd;
    border-radius: 10px;
    cursor: pointer;
}

.city:hover {
    background: #f2f2f2;
}

.stopwatch-box {
    background: #ff3b3b;
    color: white;
}
</style>

</head>

<body>

<div id="swControls">
    <button class="start" onclick="startSW()">Başlat</button>
    <button class="stop" onclick="stopSW()">Durdur</button>
    <button class="reset" onclick="resetSW()">Sıfırla</button>
</div>

<div class="container">

    <div id="bigCity">İstanbul</div>
    <div id="bigTime">--:--:--</div>

    <div class="cities">
        <div class="city" onclick="setCity('Europe/Istanbul','İstanbul')">İstanbul</div>
        <div class="city" onclick="setCity('Europe/London','Londra')">Londra</div>
        <div class="city" onclick="setCity('America/New_York','New York')">New York</div>
        <div class="city" onclick="setCity('Asia/Tokyo','Tokyo')">Tokyo</div>

        <div class="city stopwatch-box" onclick="openSW()">Kronometre</div>
    </div>

</div>

<script>

let currentZone = "Europe/Istanbul";
let currentName = "İstanbul";
let stopwatchMode = false;

function setCity(zone, name){
    stopwatchMode = false;
    currentZone = zone;
    currentName = name;
    document.getElementById("bigCity").textContent = name;
    document.getElementById("swControls").style.display = "none";
}

function updateClock(){
    if(stopwatchMode) return;

    let time = new Date().toLocaleTimeString("tr-TR", {
        timeZone: currentZone,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
    });

    document.getElementById("bigTime").textContent = time;
}

let swStart = 0;
let swElapsed = 0;
let swInterval;
let running = false;

function formatTime(ms){
    let h = Math.floor(ms / 3600000);
    let m = Math.floor((ms % 3600000) / 60000);
    let s = Math.floor((ms % 60000) / 1000);
    let cs = Math.floor((ms % 1000) / 10);

    return String(h).padStart(2,'0') + ":" +
           String(m).padStart(2,'0') + ":" +
           String(s).padStart(2,'0') + "." +
           String(cs).padStart(2,'0');
}

function updateSW(){
    let now = Date.now();
    swElapsed = now - swStart;
    document.getElementById("bigTime").textContent = formatTime(swElapsed);
}

function startSW(){
    if(!running){
        running = true;
        swStart = Date.now() - swElapsed;
        swInterval = setInterval(updateSW, 16);
    }
}

function stopSW(){
    running = false;
    clearInterval(swInterval);
}

function resetSW(){
    stopSW();
    swElapsed = 0;
    document.getElementById("bigTime").textContent = "00:00:00.00";
}

function openSW(){
    stopwatchMode = true;
    document.getElementById("bigCity").textContent = "Kronometre";
    document.getElementById("swControls").style.display = "flex";
    resetSW();
}

setInterval(updateClock, 1000);
updateClock();

</script>

</body>
</html>
