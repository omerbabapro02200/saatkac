<title>Dünya Saatleri</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #000, #111, #0d1b2a);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
    font-family: 'Orbitron', sans-serif;
    color: white;
}

@keyframes bg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.city {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,255,200,0.2);
    backdrop-filter: blur(10px);
}

.time {
    font-size: 40px;
    color: #00ffcc;
    margin-top: 10px;
    text-shadow: 0 0 20px #00ffcc;
}

.name {
    font-size: 20px;
    opacity: 0.8;
}
</style>

</head>

<body>

<div class="container">

    <div class="city">
        <div class="name">İstanbul</div>
        <div class="time" id="istanbul"></div>
    </div>

    <div class="city">
        <div class="name">Londra</div>
        <div class="time" id="london"></div>
    </div>

    <div class="city">
        <div class="name">New York</div>
        <div class="time" id="ny"></div>
    </div>

    <div class="city">
        <div class="name">Tokyo</div>
        <div class="time" id="tokyo"></div>
    </div>

</div>
