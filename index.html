<title>Dünya Saatleri</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter;
    background: #fff;
    color: #111;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
}

#bigCity {
    font-size: 40px;
    margin-bottom: 10px;
    color: #666;
}

#bigTime {
    font-size: 100px;
    font-weight: 600;
}

.cities {
    margin-top: 40px;
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

.city {
    padding: 10px 15px;
    border: 1px solid #ddd;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.city:hover {
    background: #f2f2f2;
}

.stopwatch-box {
    background: #ff3b3b;
    color: white;
}
</style>

</head>

<body>

<div class="container">

    <div id="bigCity">İstanbul</div>
    <div id="bigTime">--:--:--</div>

    <div class="cities">
        <div class="city" onclick="setCity('Europe/Istanbul','İstanbul')">İstanbul</div>
        <div class="city" onclick="setCity('Europe/London','Londra')">Londra</div>
        <div class="city" onclick="setCity('America/New_York','New York')">New York</div>
        <div class="city" onclick="setCity('Asia/Tokyo','Tokyo')">Tokyo</div>

        <div class="city stopwatch-box" onclick="toggleSW()">Kronometre</div>
    </div>

</div>

<script>

let currentZone = "Europe/Istanbul";
let currentName = "İstanbul";
let stopwatchMode = false;

function setCity(zone, name){
    stopwatchMode = false;
    currentZone = zone;
    currentName = name;
    document.getElementById("bigCity").innerText = name;
}

/* SAAT */
function updateClock(){
    if(stopwatchMode) return;

    let time = new Date().toLocaleTimeString("tr-TR", {
        timeZone: currentZone,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
    });

    document.getElementById("bigTime").innerText = time;
}

/* KRONOMETRE */

let swStart = 0;
let swElapsed = 0;
let swInterval;
let running = false;

function formatTime(ms){
    let h = Math.floor(ms / 3600000);
    let m = Math.floor((ms % 3600000) / 60000);
    let s = Math.floor((ms % 60000) / 1000);
    let cs = Math.floor((ms % 1000) / 10); // 2 haneli

    return String(h).padStart(2,'0') + ":" +
           String(m).padStart(2,'0') + ":" +
           String(s).padStart(2,'0') + "." +
           String(cs).padStart(2,'0');
}

function updateSW(){
    let now = Date.now();
    swElapsed = now - swStart;
    document.getElementById("bigTime").innerText = formatTime(swElapsed);
}

function startSW(){
    if(!running){
        running = true;
        swStart = Date.now() - swElapsed;
        swInterval = setInterval(updateSW, 16);
    }
}

function stopSW(){
    running = false;
    clearInterval(swInterval);
}

function resetSW(){
    stopSW();
    swElapsed = 0;
    document.getElementById("bigTime").innerText = "00:00:00.00";
}

function toggleSW(){
    stopwatchMode = !stopwatchMode;

    if(stopwatchMode){
        document.getElementById("bigCity").innerText = "Kronometre";
        resetSW();
        startSW();
    }else{
        stopSW();
        document.getElementById("bigCity").innerText = currentName;
        updateClock();
    }
}

/* interval */
setInterval(updateClock, 1000);
updateClock();

</script>

</body>
</html>
